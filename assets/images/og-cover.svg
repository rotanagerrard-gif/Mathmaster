<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <!-- grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <path d="M0 90 H1200 M0 180 H1200 M0 270 H1200 M0 360 H1200 M0 450 H1200 M0 540 H1200"/>
    <path d="M100 0 V630 M200 0 V630 M300 0 V630 M400 0 V630 M500 0 V630 M600 0 V630 M700 0 V630 M800 0 V630 M900 0 V630 M1000 0 V630 M1100 0 V630"/>
  </g>
  <!-- logo -->
  <rect x="80" y="80" width="100" height="100" rx="24" fill="url(#brand)"/>
  <text x="130" y="155" font-family="Georgia, serif" font-size="64" font-weight="700" text-anchor="middle" fill="#fff">∑</text>
  <text x="200" y="150" font-family="Inter, sans-serif" font-size="44" font-weight="800" fill="#f1f5f9">Math<tspan fill="url(#brand)">Master</tspan></text>
  <!-- headline -->
  <text x="80" y="320" font-family="Inter, sans-serif" font-size="80" font-weight="800" fill="#f1f5f9">Learn Math the</text>
  <text x="80" y="410" font-family="Inter, sans-serif" font-size="80" font-weight="800" fill="url(#brand)">Smart Way.</text>
  <!-- subtitle -->
  <text x="80" y="475" font-family="Inter, sans-serif" font-size="28" fill="#94a3b8">Interactive lessons · Instant feedback · XP &amp; achievements</text>
  <!-- tags -->
  <g font-family="Inter, sans-serif" font-size="22" font-weight="600">
    <rect x="80" y="520" width="170" height="50" rx="25" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-opacity="0.4"/>
    <text x="165" y="552" text-anchor="middle" fill="#a5b4fc">13 Topics</text>
    <rect x="270" y="520" width="190" height="50" rx="25" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-opacity="0.4"/>
    <text x="365" y="552" text-anchor="middle" fill="#c4b5fd">40+ Lessons</text>
    <rect x="480" y="520" width="150" height="50" rx="25" fill="#ec4899" fill-opacity="0.15" stroke="#ec4899" stroke-opacity="0.4"/>
    <text x="555" y="552" text-anchor="middle" fill="#f9a8d4">∞ Practice</text>
    <rect x="650" y="520" width="130" height="50" rx="25" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-opacity="0.4"/>
    <text x="715" y="552" text-anchor="middle" fill="#6ee7b7">100% Free</text>
  </g>
