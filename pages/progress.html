<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b1020" />
  <title>My Progress — MathMaster</title>
  <meta name="description" content="Track your XP, level, streak, per-topic accuracy, and achievements." />
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="page-loader" role="status" aria-label="Loading"><div class="core"></div><div class="lbl">∑</div></div>
  <div id="nav-slot"></div>

  <main id="main" class="container">
    <div class="page-head reveal">
      <div class="breadcrumb"><a href="../index.html">Home</a><span class="sep">/</span><span>Progress</span></div>
      <h1>📈 Your <span class="gradient-text">Progress</span></h1>
      <p class="text-lg">Every answer counts. Watch your skills grow over time.</p>
    </div>

    <!-- Level + XP hero -->
    <div class="card reveal" id="levelCard"></div>

    <!-- Stat cards -->
    <div class="grid grid-4 mt-5" id="statCards"></div>

    <!-- Two columns: topic mastery + streak/heatmap -->
    <div class="grid mt-5" style="grid-template-columns: 1.3fr 1fr; gap: var(--sp-5);" id="twoCol"></div>

    <!-- Achievements -->
    <section class="section-tight mt-5">
      <div class="section-head reveal" style="text-align:left;margin:0 0 var(--sp-5);">
        <span class="eyebrow">Achievements</span>
        <h2 style="font-size: var(--fs-2xl);">🏅 Badges & Milestones</h2>
      </div>
      <div class="grid grid-4" id="achievementsGrid"></div>
    </section>

    <!-- Activity history -->
    <section class="section-tight">
      <div class="card reveal">
        <h3 style="margin-bottom: var(--sp-4);">📜 Recent Activity</h3>
        <div id="historyList"></div>
      </div>
    </section>
  </main>

  <div id="footer-slot"></div>

  <script src="../js/modules/utils.js"></script>
  <script src="../js/modules/storage.js"></script>
  <script src="../js/modules/theme.js"></script>
  <script src="../js/modules/sound.js"></script>
  <script src="../js/modules/auth.js"></script>
  <script src="../js/modules/lessonsData.js"></script>
  <script src="../js/modules/mathEngine.js"></script>
  <script src="../js/modules/components.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/pages/progress.js"></script>
</body>
</html>
