<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b1020" />
  <title>Leaderboard — MathMaster</title>
  <meta name="description" content="See who's topping the MathMaster leaderboard. Compete on XP, streaks, and accuracy." />
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="page-loader" role="status" aria-label="Loading"><div class="core"></div><div class="lbl">∑</div></div>
  <div id="nav-slot"></div>

  <main id="main" class="container">
    <div class="page-head reveal">
      <div class="breadcrumb"><a href="../index.html">Home</a><span class="sep">/</span><span>Leaderboard</span></div>
      <h1>🏆 <span class="gradient-text">Leaderboard</span></h1>
      <p class="text-lg">The top math minds on MathMaster. Earn XP to climb the ranks!</p>
    </div>

    <!-- Filter tabs -->
    <div class="chip-row reveal">
      <button class="chip active" data-sort="xp">⭐ By XP</button>
      <button class="chip" data-sort="streak">🔥 By Streak</button>
      <button class="chip" data-sort="accuracy">🎯 By Accuracy</button>
      <button class="chip" data-sort="lessons">📚 By Lessons</button>
    </div>

    <!-- Top 3 podium -->
    <div class="grid grid-3 mt-5" id="podium"></div>

    <!-- Full table -->
    <div class="card reveal mt-5">
      <div class="table-wrap" style="border:none;">
        <table class="data" id="boardTable">
          <thead>
            <tr><th>#</th><th>Learner</th><th>Level</th><th>XP</th><th>Streak</th><th>Accuracy</th></tr>
          </thead>
          <tbody id="boardBody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <div id="footer-slot"></div>

  <script src="../js/modules/utils.js"></script>
  <script src="../js/modules/storage.js"></script>
  <script src="../js/modules/theme.js"></script>
  <script src="../js/modules/sound.js"></script>
  <script src="../js/modules/auth.js"></script>
  <script src="../js/modules/lessonsData.js"></script>
  <script src="../js/modules/mathEngine.js"></script>
  <script src="../js/modules/components.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/pages/leaderboard.js"></script>
</body>
</html>
