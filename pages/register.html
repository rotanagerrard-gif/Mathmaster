<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b1020" />
  <title>Create Account — MathMaster</title>
  <meta name="description" content="Create your free MathMaster account and start mastering math today." />
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="page-loader" role="status" aria-label="Loading"><div class="core"></div><div class="lbl">∑</div></div>
  <div id="nav-slot"></div>

  <main id="main">
    <div class="auth-wrap container">
      <div class="auth-card card reveal">
        <div class="head">
          <div class="logo brand">∑</div>
          <h1>Join MathMaster</h1>
          <p>Free forever. Start learning in seconds.</p>
        </div>

        <form id="registerForm" novalidate>
          <div class="field">
            <label for="name">Full Name</label>
            <input type="text" id="name" class="input" placeholder="Ada Lovelace" autocomplete="name" required />
            <div class="field-error" id="nameErr"></div>
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" class="input" placeholder="you@example.com" autocomplete="email" required />
            <div class="field-error" id="emailErr"></div>
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" class="input" placeholder="At least 6 characters" autocomplete="new-password" required />
            <div class="field-error" id="passErr"></div>
            <div class="progress sm mt-2" id="strengthBar" style="display:none;"><div class="bar" style="width:0%;background:var(--danger);"></div></div>
            <div class="text-xs text-muted mt-1" id="strengthTxt"></div>
          </div>
          <div class="field">
            <label for="password2">Confirm Password</label>
            <input type="password" id="password2" class="input" placeholder="Re-enter password" autocomplete="new-password" required />
            <div class="field-error" id="pass2Err"></div>
          </div>
          <label class="checkbox mt-2"><input type="checkbox" id="terms" required /> I agree to the <a href="#" style="color:var(--brand-1);">Terms</a> & <a href="#" style="color:var(--brand-1);">Privacy Policy</a></label>
          <div class="field-error" id="termsErr"></div>
          <button type="submit" class="btn btn-primary btn-block btn-lg mt-4">Create Account →</button>
        </form>

        <div class="divider">or</div>
        <button class="btn btn-ghost btn-block" id="demoBtn">🚀 Skip — use Demo Account</button>

        <div class="auth-alt">Already have an account? <a href="login.html">Sign in</a></div>
      </div>
    </div>
  </main>

  <div id="footer-slot"></div>

  <script src="../js/modules/utils.js"></script>
  <script src="../js/modules/storage.js"></script>
  <script src="../js/modules/theme.js"></script>
  <script src="../js/modules/sound.js"></script>
  <script src="../js/modules/auth.js"></script>
  <script src="../js/modules/lessonsData.js"></script>
  <script src="../js/modules/mathEngine.js"></script>
  <script src="../js/modules/components.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/pages/auth.js"></script>
</body>
</html>
